apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: default
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
          - name: MYSQL_ROOT_PASSWORD
            value: naresh
          - name: MYSQL_DATABASE
            value: doctor_appointment
          - name: MYSQL_USER
            value: doctor_user
          - name: MYSQL_PASSWORD
            value: doctor_pass123
        ports:
          - containerPort: 3306
        volumeMounts:
          - name: mysql-data
            mountPath: /var/lib/mysql
          - name: mysql-init
            mountPath: /docker-entrypoint-initdb.d/init.sql
            subPath: init.sql
      volumes:
        - name: mysql-data
          emptyDir: {}
        - name: mysql-init
          configMap:
            name: mysql-init-sql
            items:
              - key: init.sql
                path: init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: default
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: default
data:
  init.sql: |
    -- Doctor Appointment System Database Schema

    USE doctor_appointment;

    -- Create admin table
    CREATE TABLE IF NOT EXISTS admin (
      id INT PRIMARY KEY AUTO_INCREMENT,
      email VARCHAR(100) NOT NULL UNIQUE,
      password VARCHAR(255) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- Create doctor table
    CREATE TABLE IF NOT EXISTS doctor (
      id INT PRIMARY KEY AUTO_INCREMENT,
      name VARCHAR(100) NOT NULL,
      specialization VARCHAR(100),
      email VARCHAR(100) NOT NULL UNIQUE,
      password VARCHAR(255) NOT NULL,
      phone VARCHAR(15),
      availability VARCHAR(500),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      INDEX(email)
    );

    -- Create patient table
    CREATE TABLE IF NOT EXISTS patient (
      id INT PRIMARY KEY AUTO_INCREMENT,
      name VARCHAR(100) NOT NULL,
      email VARCHAR(100) NOT NULL UNIQUE,
      password VARCHAR(255) NOT NULL,
      phone VARCHAR(15),
      age INT,
      gender VARCHAR(10),
      address TEXT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      INDEX(email)
    );

    -- Create appointment table
    CREATE TABLE IF NOT EXISTS appointment (
      id INT PRIMARY KEY AUTO_INCREMENT,
      patient_id INT NOT NULL,
      doctor_id INT NOT NULL,
      appointment_date DATE NOT NULL,
      appointment_time TIME NOT NULL,
      reason TEXT,
      status VARCHAR(20) DEFAULT 'pending',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY (patient_id) REFERENCES patient(id) ON DELETE CASCADE,
      FOREIGN KEY (doctor_id) REFERENCES doctor(id) ON DELETE CASCADE,
      INDEX(patient_id, doctor_id, appointment_date)
    );

    -- Create default admin account
    INSERT INTO admin (email, password) VALUES ('admin@example.com', 'admin123');

    -- Create sample doctors
    INSERT INTO doctor (name, specialization, email, password, phone, availability) VALUES
    ('Dr. John Smith', 'Cardiology', 'john@clinic.com', 'password123', '9876543210', 'Mon-Fri: 9AM-5PM'),
    ('Dr. Sarah Johnson', 'Neurology', 'sarah@clinic.com', 'password123', '9876543211', 'Mon-Sat: 10AM-6PM'),
    ('Dr. Michael Brown', 'Orthopedics', 'michael@clinic.com', 'password123', '9876543212', 'Tue-Sat: 9AM-5PM');
