apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: default  # change if using a different namespace
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-app
        image: kristen08/frontend:2026-06-06-113823
        ports:
        - containerPort: 3003

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default  # change if using a different namespace
  labels:
    app: frontend
    release: my-release  # optional, you can customize or remove
spec:
  selector:
    app: frontend
  ports:
  - name: http
    protocol: TCP
    port: 3003
    targetPort: 3003
  type: ClusterIP  # or LoadBalancer if you want it exposed externally
