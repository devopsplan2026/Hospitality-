spring:
  application:
    name: doctor-appointment-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/doctor_appointment}
    username: ${SPRING_DATASOURCE_USERNAME:doctor_user}
    password: ${SPRING_DATASOURCE_PASSWORD:doctor_pass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  cors:
    allowed-origins: http://localhost:3003,http://127.0.0.1:3003
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: '*'
    allow-credentials: true

server:
  port: 8083
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.doctor: DEBUG

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-in-production}
  expiration: 86400000
